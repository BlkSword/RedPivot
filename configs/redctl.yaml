# redctl - RedPivot Client Configuration
# Connect to RedPivot server and expose local services

# Client connection settings
client:
  # Server WebSocket URL
  server: "wss://your-server.com:443/ws"
  # Authentication token
  token: "your-secret-token-here-change-me"
  # Skip TLS certificate verification (not recommended for production)
  insecure_skip_verify: false

  # Reconnection settings
  reconnect:
    enabled: true
    max_attempts: 10
    initial_delay: 1s
    max_delay: 60s

  # HTTP Appearance - Traffic camouflage to mimic browser traffic
  # This helps avoid detection by making traffic look like normal HTTPS
  http_appearance:
    enabled: true
    # Browser type for random UA: chrome, firefox, safari, edge, any
    browser: "chrome"
    # Or use custom User-Agent (overrides browser selection)
    # user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    # Custom HTTP headers to add
    extra_headers:
      Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
      Accept-Language: "en-US,en;q=0.9"
      Cache-Control: "max-age=0"
      Connection: "keep-alive"
    # URI template for WebSocket path (optional)
    # uri_template: "/api/v1/stream"

# Proxy definitions
# Each proxy exposes a local service through the tunnel

proxies:
  # ===========================================
  # TCP Proxies - Raw TCP port forwarding
  # ===========================================

  # TCP Proxy - Expose SSH server
  - name: "ssh"
    type: "tcp"
    local: "127.0.0.1:22"
    remote_port: 6022

  # TCP Proxy - Expose RDP
  - name: "rdp"
    type: "tcp"
    local: "127.0.0.1:3389"
    remote_port: 6389

  # UDP Proxy - Expose DNS server
  - name: "dns"
    type: "udp"
    local: "127.0.0.1:53"
    remote_port: 6053

  # ===========================================
  # HTTP Proxies - Web application exposure
  # ===========================================

  # HTTP Proxy - Expose web application with subdomain
  - name: "webapp"
    type: "http"
    local: "127.0.0.1:8080"
    subdomain: "myapp"
    # Accessible at: myapp.example.com

  # HTTP Proxy - Expose API service
  - name: "api"
    type: "http"
    local: "127.0.0.1:3000"
    subdomain: "api"

  # HTTPS Proxy - TLS termination with custom certificate
  # - name: "secure-web"
  #   type: "https"
  #   local: "127.0.0.1:8443"
  #   subdomain: "secure"
  #   cert_file: "/etc/redctl/cert.pem"
  #   key_file: "/etc/redctl/key.pem"

  # ===========================================
  # SOCKS5 Proxies - Dynamic proxy support
  # ===========================================

  # SOCKS5 Forward Proxy - Client-side SOCKS5 server
  # Traffic flows: Tool -> Client SOCKS5 -> Tunnel -> Server -> Target
  - name: "socks5-proxy"
    type: "socks5"
    local: "127.0.0.1:1080"
    # remote_port is optional - server can auto-assign
    # remote_port: 7580

  # SOCKS5 Reverse Proxy - Server-side SOCKS5 server
  # Traffic flows: Tool -> Server SOCKS5 -> Tunnel -> Client -> Target
  - name: "rsocks5-proxy"
    type: "rsocks5"
    local: "127.0.0.1:1080"
    remote_port: 7580  # Required for rsocks5

  # ===========================================
  # Secure TCP (STCP) - Key-protected TCP
  # ===========================================

  # STCP Proxy - Requires secret key for access
  # - name: "secret-service"
  #   type: "stcp"
  #   local: "127.0.0.1:9000"
  #   remote_port: 6900
  #   secret_key: "shared-secret-key"

# Logging configuration
logging:
  level: "info"
  format: "text"
  output: "stdout"
